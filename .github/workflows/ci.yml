name: Minimal Install Test

on:
  push:
    branches: [ main ]

jobs:
  test-install:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y poppler-utils tesseract-ocr || true
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install core only
      run: |
        pip install --upgrade pip
        pip install pydantic pdfplumber pymupdf
        python -c "print('✓ Installation successful')"